name: Backend CI

on:
  push:
    branches: [main]
    paths: [backend/**]
  pull_request:
    paths: [backend/**]

defaults:
  run:
    working-directory: backend

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v6
        with:
          version: "latest"
      - run: uv sync --frozen
      - run: uv run ruff check app tests
      - run: uv run ruff format --check app tests

  test:
    runs-on: ubuntu-latest
    env:
      AGENT_LLM: "off"
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v6
        with:
          version: "latest"
      - run: uv sync --frozen
      - run: uv run pytest -q
