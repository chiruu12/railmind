# Render Blueprint — RailMind backend (always-on FastAPI: WebSocket + sim loop).
# Free web service. Spins down after ~15 min idle; wake it before a demo.
#
# Deploy (do this via Blueprint, NOT a manual service):
#   Render dashboard → New + → Blueprint → pick chiruu12/railmind →
#   it reads this file and creates the service on branch `main`.
#   Then set the *_API_KEY secrets in the dashboard (sync: false below).

services:
  - type: web
    name: railmind-backend
    runtime: docker
    branch: main # deploy from main only
    autoDeploy: true # redeploy automatically on every push to main
    dockerfilePath: ./backend/Dockerfile
    dockerContext: . # build context is the repo root (Dockerfile copies backend/ + data/)
    plan: free
    region: singapore
    healthCheckPath: /health
    envVars:
      - key: AGENT_LLM
        value: "on" # LLM-backed rationale; needs the API keys below
      - key: OPENAI_MODEL
        value: gpt-4o-mini # accepts max_tokens (gpt-5* models reject it)
      - key: DATA_DIR
        value: /data
      - key: DB_PATH
        value: /tmp/railmind.sqlite
      # Secrets — set values in the Render dashboard (sync: false keeps them out of git).
      - key: GROQ_API_KEY
        sync: false
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: DEEPGRAM_API_KEY
        sync: false
